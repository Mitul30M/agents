version: "3.8"

services:

  redis:
    image: redis:7
    container_name: redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: ["redis-server", "--appendonly", "yes"]

  web:
    build:
      context: ./llama-chatbot
      dockerfile: Dockerfile
    container_name: llama-chatbot-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
      OLLAMA_API_KEY: ${OLLAMA_API_KEY}
      OLLAMA_BASE_URL: http://host.docker.internal:11434
    volumes:
      - ./logs:/app/logs
    depends_on:
      - redis

  orchestrator:
    build:
      context: ./agents
      dockerfile: Dockerfile
    container_name: deployment-incident-orchestrator
    restart: unless-stopped

    env_file:
      - ./agents/.env

    environment:
      REDIS_URL: redis://redis:6379
      LOG_DIR: /app/logs
      APP_LOG_PATH: /app/logs/app.log
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      GH_TOKEN: ${GH_TOKEN}
      REMEDIATION_REPO_PATH: /workspace/llama-chatbot
    volumes:
      - ./logs:/app/logs
      - ./llama-chatbot:/workspace/llama-chatbot:rw

    ports:
      - "8000:8000"

    depends_on:
      - redis

volumes:
  redis-data:



